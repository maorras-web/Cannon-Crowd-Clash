<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cannon Crowd Clash</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="ui-hud">
        <div class="hud-top-bar">
            <button id="pause-btn" class="hud-btn">⏸️</button>
            <div class="hud-card">ניקוד: <span id="score-val">0</span> ⭐</div>
        </div>
        
        <div id="instructions">החלק ימינה ושמאלה כדי להזיז את התותח!</div>

        <!-- חלון סיום משחק -->
        <div id="game-status" class="status-popup hidden">
            <h2 id="status-title">🏆 ניצחת!</h2>
            <button id="restart-btn" class="main-btn">שחק שוב 🔄</button>
        </div>

        <!-- חלון הפסקה -->
        <div id="pause-menu" class="status-popup hidden">
            <h2>משחק מושהה ⏸️</h2>
            <button id="resume-btn" class="main-btn">המשך משחק ▶️</button>
        </div>
    </div>

    <script src="main.js" defer></script>
</body>
</html>
