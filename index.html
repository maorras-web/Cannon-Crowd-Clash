<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cannon Crowd Clash</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rubik', sans-serif; overflow: hidden; margin: 0; background: #050714; user-select: none; }
        .color-btn { width: 32px; height: 32px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.2s; }
        .color-btn.active { border-color: #ffffff; transform: scale(1.15); }
    </style>
</head>
<body>

    <!-- כפתור פאוזה -->
    <button id="pause-btn" class="hidden absolute top-4 left-4 z-20 bg-slate-800/80 hover:bg-slate-700 text-white p-3 rounded-full shadow-lg backdrop-blur border border-slate-600 transition">
        ⚙️
    </button>

    <!-- תוצאת ניקוד -->
    <div id="score-card" class="hidden absolute top-4 right-4 z-20 bg-slate-900/80 backdrop-blur border border-slate-700 px-5 py-2 rounded-2xl text-white font-bold text-xl shadow-xl flex items-center gap-3">
        <span>⭐ <span data-i18n="score">ניקוד</span>: <span id="score-val">0</span></span>
        <span class="text-yellow-400 text-sm">| 🏆 <span data-i18n="best">שיא</span>: <span id="best-val">0</span></span>
    </div>

    <!-- מסך פתיחה -->
    <div id="start-overlay" class="absolute inset-0 z-30 flex items-center justify-center bg-slate-950/80 backdrop-blur-md transition-opacity duration-500">
        <div id="start-menu" class="bg-slate-900/90 border border-slate-700 p-8 rounded-3xl shadow-2xl text-white text-center max-w-sm w-full mx-4">
            <h1 class="text-4xl font-black mb-2 tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">CANNON CLASH</h1>
            <p class="text-slate-400 text-sm mb-6" data-i18n="subtitle">עבור בשערים והגע לניקוד הגבוה ביותר!</p>

            <div class="mb-6 text-start">
                <label class="block text-sm font-medium mb-1 text-slate-300" data-i18n="language">שפה</label>
                <select id="lang-select" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-2 text-white outline-none focus:border-blue-500">
                    <option value="he">עברית 🇮🇱</option>
                    <option value="en">English 🇺🇸</option>
                </select>
            </div>

            <div class="mb-6 bg-slate-800/50 p-3 rounded-xl border border-slate-700/50">
                <span class="text-yellow-400 font-bold">🏆 <span data-i18n="personalBest">שיא אישי</span>: <span id="menu-best-val">0</span></span>
            </div>

            <button id="start-btn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-blue-600/30 transition transform active:scale-95" data-i18n="startGame">
                התחל משחק 🚀
            </button>
        </div>
    </div>

    <!-- תפריט פאוזה והגדרות -->
    <div id="pause-menu" class="hidden absolute inset-0 z-40 flex items-center justify-center bg-slate-950/80 backdrop-blur-md">
        <div class="bg-slate-900 border border-slate-700 p-8 rounded-3xl shadow-2xl text-white text-center max-w-sm w-full mx-4">
            <h2 class="text-2xl font-black mb-6" data-i18n="gamePaused">הגדרות ופאוזה ⚙️</h2>

            <div class="mb-6 text-start">
                <label class="block text-sm font-medium mb-2 text-slate-300" data-i18n="cannonColor">צבע התותח 🎨</label>
                <div class="flex justify-between gap-2 px-2">
                    <div class="color-btn active" style="background: #dc2626;" data-color="14431142"></div>
                    <div class="color-btn" style="background: #2563eb;" data-color="2450923"></div>
                    <div class="color-btn" style="background: #16a34a;" data-color="1487690"></div>
                    <div class="color-btn" style="background: #9333ea;" data-color="9646570"></div>
                    <div class="color-btn" style="background: #db2777;" data-color="14362487"></div>
                    <div class="color-btn" style="background: #f59e0b;" data-color="16093451"></div>
                </div>
            </div>

            <div class="mb-6 text-start">
                <label class="block text-sm font-medium mb-1 text-slate-300" data-i18n="volume">עוצמת שמע 🔊</label>
                <input id="volume-slider" type="range" min="0" max="1" step="0.05" value="0.25" class="w-full accent-blue-500 cursor-pointer">
            </div>

            <button id="resume-btn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3.5 rounded-2xl shadow-lg transition transform active:scale-95" data-i18n="resumeGame">
                המשך משחק ▶️
            </button>
        </div>
    </div>

    <!-- קובץ הלוגיקה הראשי -->
    <script src="main.js"></script>
</body>
</html>
